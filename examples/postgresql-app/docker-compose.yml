services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: quark
      POSTGRES_PASSWORD: quark
      POSTGRES_USER: quark
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quark -d quark"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ../..
      dockerfile: examples/postgresql-app/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      POSTGRES_DATABASE: quark
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: quark
      POSTGRES_PORT: 5432
      POSTGRES_USER: quark
    ports:
      - "3013:3000"

volumes:
  postgres-data:
